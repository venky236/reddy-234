name: "Terraform Apply (Reusable)"

on:
  workflow_call:
    inputs:
      stack:
        description: "Stack name (base|clay|kiln-trace|integration-user)"
        required: true
        type: string
      env:
        description: "Target environment (qa, staging, prod, nonprod, nonprod-rds)"
        required: true
        type: string
      acct:
        description: "AWS account (nonprod|prod)"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      terraform_version:
        description: "Terraform version to use"
        required: false
        type: string
        default: "1.12.x"
    secrets:
      NONPROD_AWS_ACCESS_KEY_ID:
        required: true
      NONPROD_AWS_SECRET_ACCESS_KEY:
        required: true
      # TODO: uncomment when prod secrets are added to the repo
      # PROD_AWS_ACCESS_KEY_ID:
      #   required: false
      # PROD_AWS_SECRET_ACCESS_KEY:
      #   required: false
      AMPLIWORK_PKG_READER_APP_ID:
        required: true
      AMPLIWORK_PKG_READER_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  # ── Job 1: Plan ───────────────────────────────────────────────────────────
  # Runs terraform plan and posts the output to the job summary so that
  # approvers can review the changes before clicking Approve in Job 2.
  plan:
    name: "Plan – ${{ inputs.stack }} / ${{ inputs.env }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea # v4.3.0
        with:
          # TODO: when prod is enabled, select creds based on inputs.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.stack }}
        run: terraform init -reconfigure -backend-config="config/${{ inputs.env }}.hcl"

      - name: Terraform plan
        id: plan
        working-directory: ${{ inputs.stack }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan \
            -var-file="environments/${{ inputs.env }}.tfvars" 2>&1 | tee plan-output.txt

      - name: Post plan to job summary
        if: always()
        run: |
          echo "### Terraform Plan – \`${{ inputs.stack }}\` / \`${{ inputs.env }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Show Plan</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo 'terraform' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ inputs.stack }}/plan-output.txt" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"
          
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.stack }}-${{ inputs.env }}
          path: ${{ inputs.stack }}/tfplan
          retention-days: 7

  # ── Job 2: Approve ────────────────────────────────────────────────────────
  # Gate job backed by a GitHub Environment. Reviewers see the Job 1 summary
  # (the full plan output) and click Approve or Reject in the GitHub UI.
  # Configure required reviewers at: Settings → Environments → <env>.
  approve:
    name: "Approve – ${{ inputs.stack }} / ${{ inputs.env }}"
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    steps:
      - name: Approval gate
        run: echo "Deployment to ${{ inputs.stack }} / ${{ inputs.env }} approved."

  # ── Job 3: Apply ──────────────────────────────────────────────────────────
  # Downloads the exact tfplan binary produced by Job 1 and applies it.
  # Using the saved plan file guarantees that what was reviewed is what gets applied.
  apply:
    name: "Apply – ${{ inputs.stack }} / ${{ inputs.env }}"
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea # v4.3.0
        with:
          # TODO: when prod is enabled, select creds based on inputs.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.stack }}
        run: terraform init -reconfigure -backend-config="config/${{ inputs.env }}.hcl"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.stack }}-${{ inputs.env }}
          path: ${{ inputs.stack }}

      - name: Terraform apply
        working-directory: ${{ inputs.stack }}
        run: terraform apply -auto-approve -input=false tfplan
