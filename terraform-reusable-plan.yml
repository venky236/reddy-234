name: "Terraform Plan (Reusable)"

on:
  workflow_call:
    inputs:
      stack:
        description: "Stack name (base|clay|kiln-trace|integration-user)"
        required: true
        type: string
      env:
        description: "Target environment (qa, staging, prod, nonprod, nonprod-rds)"
        required: true
        type: string
      acct:
        description: "AWS account (nonprod|prod)"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      terraform_version:
        description: "Terraform version to use"
        required: false
        type: string
        default: "1.12.x"
    secrets:
      NONPROD_AWS_ACCESS_KEY_ID:
        required: true
      NONPROD_AWS_SECRET_ACCESS_KEY:
        required: true
      # TODO: uncomment when prod secrets are added to the repo
      # PROD_AWS_ACCESS_KEY_ID:
      #   required: false
      # PROD_AWS_SECRET_ACCESS_KEY:
      #   required: false
      AMPLIWORK_PKG_READER_APP_ID:
        required: true
      AMPLIWORK_PKG_READER_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: "Plan – ${{ inputs.stack }} / ${{ inputs.env }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          # TODO: when prod is enabled, select creds based on inputs.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}


      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      # ── Quality gates ────────────────────────────────────────────────────────

      - name: Terraform fmt
        id: fmt
        working-directory: ${{ inputs.stack }}
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform init
        id: init
        working-directory: ${{ inputs.stack }}
        # Each env has its own config/<env>.hcl with the bucket + key already
        # embedded, so no dynamic key override is needed.
        run: terraform init -reconfigure -backend-config="config/${{ inputs.env }}.hcl"

      - name: Terraform validate
        id: validate
        working-directory: ${{ inputs.stack }}
        run: terraform validate -no-color

      # - name: Setup TFLint
      #   uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
      #   with:
      #     tflint_version: latest

      # - name: Run TFLint
      #   id: tflint
      #   working-directory: ${{ inputs.stack }}
      #   run: |
      #     tflint --init --config "$GITHUB_WORKSPACE/.tflint.hcl"
      #     tflint --config "$GITHUB_WORKSPACE/.tflint.hcl" --format compact
      #   continue-on-error: true

      - name: tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: ${{ inputs.stack }}
          soft_fail: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@ffbf56d2e40f8e09a94a2b0d95477fabff82c6dc # v12.1671.0
        with:
          directory: ${{ inputs.stack }}
          config_file: .checkov.yml
          soft_fail: true

      # ── Plan ─────────────────────────────────────────────────────────────────

      - name: Terraform plan
        id: plan
        working-directory: ${{ inputs.stack }}
        run: |
          terraform plan -no-color -input=false -out=tfplan \
            -var-file="environments/${{ inputs.env }}.tfvars"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.stack }}-${{ inputs.env }}
          path: ${{ inputs.stack }}/tfplan
          retention-days: 3

      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        if: always() && github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ github.token }}
          script: |
            const output = `### Terraform Plan – \`${{ inputs.stack }}\` / \`${{ inputs.env }}\`

            | Step     | Status |
            |----------|--------|
            | fmt      | \`${{ steps.fmt.outcome }}\` |
            | init     | \`${{ steps.init.outcome }}\` |
            | validate | \`${{ steps.validate.outcome }}\` |
            | plan     | \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });